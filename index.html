<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>City Invaders</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0b1116;
      color: #f8fbff;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", "Trebuchet MS", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .game-shell {
      position: relative;
      width: min(100vw, 56.25vh);
      height: min(100vh, 177.78vw);
      max-width: 560px;
      max-height: 996px;
      background: #0b1116;
      overflow: hidden;
      box-shadow: 0 0 80px #000;
      border: 5px solid #e9cf91;
    }

    .game-shell::after {
      content: "";
      position: absolute;
      inset: 3px;
      z-index: 20;
      border: 2px solid rgba(28, 13, 25, .7);
      box-shadow: inset 0 0 0 2px rgba(255, 210, 80, .2);
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
      touch-action: none;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 18px;
      color: white;
      font-size: clamp(16px, 4vw, 28px);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 3px 0 #11131f, 0 0 12px rgba(255, 207, 52, 0.65);
      pointer-events: none;
      user-select: none;
      z-index: 3;
    }

    .hud span {
      padding: 8px 12px;
      border: 2px solid #ffd33d;
      border-radius: 5px;
      background: #15101f;
      box-shadow: 3px 3px 0 #ca361d;
      transform: skew(-5deg);
    }

    .sound-toggle {
      position: absolute;
      top: 62px;
      right: 18px;
      z-index: 6;
      width: auto;
      min-height: 32px;
      padding: 5px 10px;
      border: 2px solid #ffd33d;
      border-radius: 4px;
      background: #15101f;
      color: #fff;
      font: 900 12px "Trebuchet MS", sans-serif;
      letter-spacing: 1px;
      box-shadow: 2px 2px 0 #ca361d;
      transform: none;
    }

    .sound-toggle:hover {
      transform: translateY(-1px);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(180deg, rgba(4, 8, 10, 0.18), rgba(3, 6, 8, 0.82)),
        url("assets/city-background-retro.png") center / cover;
      text-align: center;
      z-index: 5;
      transition: opacity .35s ease, visibility .35s ease;
    }

    .overlay[hidden] {
      display: grid;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .panel {
      width: min(100%, 380px);
      padding: 28px 22px 22px;
      border: 4px solid #f7ce3d;
      border-radius: 7px;
      background: radial-gradient(circle at 50% 0, rgba(77, 32, 111, .96), rgba(12, 8, 27, .97) 65%);
      box-shadow: 0 18px 60px #000, 6px 6px 0 #c83222, inset 0 0 35px rgba(102, 210, 255, .18);
      clip-path: polygon(18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%, 0 18px);
      animation: panelIn .65s cubic-bezier(.16, 1, .3, 1) both;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 9vw, 55px);
      letter-spacing: 2px;
      line-height: 0.95;
      color: #fff4d2;
      text-shadow: 0 4px 0 #6e240c, 0 0 24px rgba(255, 137, 35, .72);
    }

    .title-logo-link {
      display: block;
      margin-bottom: 18px;
      color: #ffbd55;
      font: 700 11px "Trebuchet MS", sans-serif;
      letter-spacing: 1px;
      text-decoration: none;
    }

    .title-logo {
      display: block;
      width: 100%;
      border: 1px solid rgba(255, 190, 69, 0.45);
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.55);
      transition: filter .15s ease, transform .15s ease;
    }

    .title-logo-link:hover .title-logo,
    .title-logo-link:focus-visible .title-logo {
      filter: brightness(1.12);
      transform: scale(1.015);
    }

    .title-logo-link span {
      display: block;
      margin-top: 7px;
    }

    .panel h1 {
      display: none;
    }

    .overlay.ending .title-logo-link {
      display: none;
    }

    .overlay.ending .promo-title,
    .overlay.ending .promo-subtitle {
      display: none;
    }

    .overlay.ending .panel h1 {
      display: block;
    }

    .eyebrow {
      margin-bottom: 9px;
      color: #fff13b;
      font: 900 13px "Trebuchet MS", sans-serif;
      font-style: italic;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 #13101a;
    }

    .promo-title {
      margin: 2px -12px 14px;
      color: #ffd438;
      font-size: clamp(37px, 9vw, 55px);
      font-style: italic;
      line-height: .83;
      letter-spacing: -1px;
      transform: rotate(-2deg);
      -webkit-text-stroke: 2px #a92819;
      text-shadow: 4px 5px 0 #100b16, 0 0 20px rgba(255, 49, 198, .55);
    }

    .promo-subtitle {
      margin: -5px 0 14px;
      color: #fff;
      font: 900 14px "Trebuchet MS", sans-serif;
      font-style: italic;
      text-shadow: 2px 2px 0 #000;
    }

    .title-word {
      display: block;
      white-space: nowrap;
    }

    .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(-65px) rotate(-10deg) scale(1.5);
      animation: letterDrop .55s cubic-bezier(.2, .8, .2, 1.25) forwards;
      animation-delay: calc(var(--i) * 45ms + 160ms);
    }

    .overlay.ending .letter {
      transform: scale(3) rotate(12deg);
      animation-name: endLetter;
      animation-duration: .65s;
    }

    .mission-line {
      color: #fff4b0;
      border-top: 2px solid #e43b72;
      padding-top: 15px;
      font-weight: 800;
      font-style: italic;
      text-shadow: 1px 2px 0 #000;
    }

    p {
      margin: 0 0 16px;
      font-size: clamp(13px, 3.2vw, 18px);
      font-family: "Trebuchet MS", Arial, sans-serif;
      line-height: 1.45;
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border: 1px solid #ffe2a3;
      border-radius: 2px;
      background: linear-gradient(#fff23c, #f39a20);
      color: #201208;
      font: 900 clamp(16px, 4vw, 20px) Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      cursor: pointer;
      letter-spacing: 2px;
      transform: skew(-4deg);
      box-shadow: 0 5px 0 #b82d20, 0 0 22px rgba(255, 61, 192, .42);
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover {
      filter: brightness(1.14);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b56a00, 0 0 18px rgba(255, 207, 52, 0.35);
    }

    .transition {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      visibility: hidden;
    }

    .transition::before,
    .transition::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 51%;
      background: #070a0a;
      transition: transform .42s cubic-bezier(.75, 0, .25, 1);
    }

    .transition::before { top: 0; transform: translateY(-101%); }
    .transition::after { bottom: 0; transform: translateY(101%); }
    .transition.active { visibility: visible; }
    .transition.active::before, .transition.active::after { transform: translateY(0); }
    .transition.open::before { transform: translateY(-101%); }
    .transition.open::after { transform: translateY(101%); }

    .battle-callout {
      position: absolute;
      top: 43%;
      left: 0;
      right: 0;
      z-index: 4;
      color: #ffe838;
      text-align: center;
      font-size: 54px;
      letter-spacing: 4px;
      font-style: italic;
      -webkit-text-stroke: 2px #ad2c1d;
      text-shadow: 4px 5px 0 #100b16, 0 0 25px #f52dbb;
      opacity: 0;
      pointer-events: none;
    }

    .battle-callout.show { animation: callout 1.25s ease both; }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(35px) scale(.92); }
    }
    @keyframes letterDrop {
      70% { opacity: 1; transform: translateY(6px) rotate(2deg) scale(.96); }
      100% { opacity: 1; transform: none; }
    }
    @keyframes endLetter {
      65% { opacity: 1; transform: scale(.88) rotate(-2deg); }
      100% { opacity: 1; transform: none; }
    }
    @keyframes callout {
      0% { opacity: 0; transform: scale(2.6); filter: blur(8px); }
      24%, 72% { opacity: 1; transform: scale(1); filter: blur(0); }
      100% { opacity: 0; transform: scale(.72); letter-spacing: 15px; }
    }

    @media (max-height: 720px) {
      .overlay { padding: 14px; }
      .panel { padding: 14px; }
      .promo-title { font-size: 34px; margin-bottom: 9px; }
      .promo-subtitle { font-size: 11px; margin-bottom: 9px; }
      .title-logo { max-height: 115px; object-fit: cover; }
      .title-logo-link { margin-bottom: 9px; }
      .mission-line { margin-bottom: 9px; padding-top: 9px; }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <canvas id="game" width="540" height="960" aria-label="City invaders game"></canvas>
    <div class="hud">
      <span id="score">SCORE: 0</span>
      <span id="lives">LIVES: 3</span>
    </div>
    <button id="soundToggle" class="sound-toggle" type="button" aria-pressed="false">SOUND: ON</button>
    <section id="overlay" class="overlay">
      <div class="panel">
        <div class="eyebrow">BOSS FIGHT TARGETS PRESENTS:</div>
        <div class="promo-title">INFLATABLE<br>INVASION!</div>
        <div class="promo-subtitle">THEY’RE BOUNCY. THEY’RE ANGRY. THEY’RE HERE!</div>
        <a class="title-logo-link" href="https://bossfighttargets.com" target="_blank" rel="noopener noreferrer">
          <img class="title-logo" src="assets/boss-fight-targets-screen.jpg" alt="Visit Boss Fight Targets">
          <span>VISIT BOSSFIGHTTARGETS.COM ↗</span>
        </a>
        <h1 data-title="CITY INVADERS">CITY INVADERS</h1>
        <p class="mission-line">Earth’s only defense: one really sharp tank! Move with arrow keys or drag and stop the invaders before they break the line.</p>
        <button id="startButton" type="button">DEPLOY TANK</button>
      </div>
    </section>
    <div id="battleCallout" class="battle-callout">DEFEND THE CITY</div>
    <div id="transition" class="transition"></div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const overlay = document.getElementById("overlay");
    const startButton = document.getElementById("startButton");
    const transition = document.getElementById("transition");
    const battleCallout = document.getElementById("battleCallout");
    const soundToggle = document.getElementById("soundToggle");

    const W = canvas.width;
    const H = canvas.height;
    const assets = {
      background: loadImage("assets/city-background-retro.png"),
      tank: loadImage("assets/player-tank.png")
    };
    const enemyImages = Array.from({ length: 21 }, (_, index) => {
      return loadImage(`assets/enemies/enemy-${String(index + 1).padStart(2, "0")}.png`);
    });

    const keys = new Set();
    let player;
    let bullets;
    let enemyBullets;
    let enemies;
    let particles;
    let floatTexts;
    let score;
    let lives;
    let bulletCooldown;
    let level;
    let formationDirection;
    let formationStepTimer;
    let formationShootTimer;
    let nextEnemyImageIndex;
    let playerInvulnerable;
    let running = false;
    let lastTime = 0;
    let pointerDown = false;
    let starting = false;
    let shake = 0;
    let muzzleFlash = 0;
    let audioContext;
    let soundEnabled = true;

    function loadImage(src) {
      const image = new Image();
      image.src = src;
      return image;
    }

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function tone(frequency, duration, options = {}) {
      if (!soundEnabled || !audioContext) return;
      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = options.type || "square";
      oscillator.frequency.setValueAtTime(frequency, now);
      oscillator.frequency.exponentialRampToValueAtTime(Math.max(30, options.endFrequency || frequency), now + duration);
      gain.gain.setValueAtTime(options.volume || 0.035, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      oscillator.connect(gain).connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + duration);
    }

    function noise(duration, volume = 0.06) {
      if (!soundEnabled || !audioContext) return;
      const length = Math.floor(audioContext.sampleRate * duration);
      const buffer = audioContext.createBuffer(1, length, audioContext.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i += 1) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / length);
      }
      const source = audioContext.createBufferSource();
      const gain = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 850;
      gain.gain.value = volume;
      source.buffer = buffer;
      source.connect(filter).connect(gain).connect(audioContext.destination);
      source.start();
    }

    function playSound(name) {
      if (name === "shoot") {
        tone(190, .07, { endFrequency: 90, type: "sawtooth", volume: .018 });
      } else if (name === "hit") {
        tone(620, .055, { endFrequency: 350, volume: .025 });
      } else if (name === "explosion") {
        noise(.22, .07);
        tone(120, .24, { endFrequency: 38, type: "sawtooth", volume: .045 });
      } else if (name === "damage") {
        noise(.32, .08);
        tone(170, .36, { endFrequency: 55, type: "square", volume: .05 });
      } else if (name === "wave") {
        tone(330, .18, { endFrequency: 520, type: "triangle", volume: .04 });
        setTimeout(() => tone(520, .24, { endFrequency: 780, type: "triangle", volume: .04 }), 130);
      } else if (name === "start") {
        tone(110, .42, { endFrequency: 520, type: "sawtooth", volume: .05 });
      } else if (name === "gameover") {
        tone(260, .35, { endFrequency: 170, type: "triangle", volume: .05 });
        setTimeout(() => tone(170, .55, { endFrequency: 65, type: "sawtooth", volume: .045 }), 260);
      }
    }

    function resetGame() {
      player = {
        x: W / 2,
        y: H - 110,
        width: 106,
        height: 148,
        speed: 420
      };
      bullets = [];
      enemyBullets = [];
      enemies = [];
      particles = [];
      floatTexts = [];
      score = 0;
      lives = 3;
      level = 0;
      formationDirection = 1;
      formationStepTimer = 0;
      formationShootTimer = 1.4;
      nextEnemyImageIndex = 0;
      bulletCooldown = 0;
      playerInvulnerable = 0;
      shake = 0;
      muzzleFlash = 0;
      createFormation();
      updateHud();
    }

    function createFormation() {
      level += 1;
      formationDirection = 1;
      formationStepTimer = 0;
      formationShootTimer = Math.max(0.75, 1.7 - Math.min(level, 8) * 0.1);
      enemies = [];
      showBattleCallout(level === 1 ? "DEFEND THE CITY" : `WAVE ${level}`);

      const cols = 6;
      const rows = 4;
      const enemyW = 66;
      const enemyH = 66;
      const gapX = 14;
      const gapY = 24;
      const startX = (W - cols * enemyW - (cols - 1) * gapX) / 2;
      const startY = 105;

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const image = enemyImages[nextEnemyImageIndex % enemyImages.length];
          nextEnemyImageIndex += 1;
          const enemyNumber = (level - 1) * rows * cols + row * cols + col + 1;
          const maxHp = enemyHpFor(enemyNumber);
          enemies.push({
            x: startX + col * (enemyW + gapX),
            y: startY + row * (enemyH + gapY),
            width: enemyW,
            height: enemyH,
            image,
            color: particleColor(nextEnemyImageIndex),
            hp: maxHp,
            maxHp,
            alive: true
          });
        }
      }
    }

    function startGame() {
      if (starting) return;
      initAudio();
      playSound("start");
      starting = true;
      transition.className = "transition active";
      setTimeout(() => {
        resetGame();
        overlay.hidden = true;
        overlay.classList.remove("ending");
        running = true;
        lastTime = performance.now();
        requestAnimationFrame(loop);
        transition.classList.add("open");
      }, 440);
      setTimeout(() => {
        transition.className = "transition";
        starting = false;
      }, 920);
    }

    function endGame(title, message) {
      running = false;
      playSound("gameover");
      overlay.classList.add("ending");
      setAnimatedTitle(title);
      overlay.querySelector("p").textContent = message;
      overlay.querySelector(".eyebrow").textContent = "CITY DEFENSE REPORT";
      startButton.textContent = "REDEPLOY";
      setTimeout(() => { overlay.hidden = false; }, 180);
    }

    function loop(now) {
      if (!running) return;
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      const move = (keys.has("ArrowRight") || keys.has("KeyD") ? 1 : 0) - (keys.has("ArrowLeft") || keys.has("KeyA") ? 1 : 0);
      player.x = clamp(player.x + move * player.speed * dt, player.width / 2 + 10, W - player.width / 2 - 10);

      bulletCooldown = Math.max(0, bulletCooldown - dt);
      if (bulletCooldown === 0) {
        shoot();
      }

      for (const bullet of bullets) {
        bullet.y -= bullet.speed * dt;
      }
      bullets = bullets.filter((bullet) => bullet.y + bullet.height > -20);

      for (const bullet of enemyBullets) {
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
      }
      enemyBullets = enemyBullets.filter((bullet) => {
        return bullet.x > -40 && bullet.x < W + 40 && bullet.y > -40 && bullet.y < H + 60 && !bullet.hit;
      });

      playerInvulnerable = Math.max(0, playerInvulnerable - dt);
      shake = Math.max(0, shake - dt * 38);
      muzzleFlash = Math.max(0, muzzleFlash - dt);
      updateEnemies(dt);
      updateParticles(dt);
      checkCollisions();

      const aliveCount = enemies.filter((enemy) => enemy.alive).length;
      if (aliveCount === 0) {
        score += 250;
        enemyBullets = [];
        createFormation();
        updateHud();
      }
    }

    function updateEnemies(dt) {
      const aliveEnemies = enemies.filter((enemy) => enemy.alive);
      if (aliveEnemies.length === 0) return;

      formationStepTimer += dt;
      if (formationStepTimer >= formationStepDelay()) {
        formationStepTimer = 0;
        const left = Math.min(...aliveEnemies.map((enemy) => enemy.x));
        const right = Math.max(...aliveEnemies.map((enemy) => enemy.x + enemy.width));
        const hitEdge = (formationDirection < 0 && left <= 18) || (formationDirection > 0 && right >= W - 18);
        const stepX = 16 + Math.min(level, 8);
        const stepY = 24;

        for (const enemy of aliveEnemies) {
          if (hitEdge) {
            enemy.y += stepY;
          } else {
            enemy.x += formationDirection * stepX;
          }

          if (enemy.y + enemy.height >= player.y - player.height / 2) {
            if (loseLife(true)) {
              if (!running) return;
              enemies = [];
              createFormation();
            }
            return;
          }
        }

        if (hitEdge) {
          formationDirection *= -1;
        }
      }

      formationShootTimer -= dt;
      if (formationShootTimer <= 0) {
        enemyShoot(shootingEnemy(aliveEnemies));
        formationShootTimer = randomBetween(0.75, 1.6);
      }
    }

    function shoot() {
      bullets.push({
        x: player.x,
        y: player.y - player.height / 2 + 10,
        width: 24,
        height: 76,
        speed: 660
      });
      muzzleFlash = 0.055;
      playSound("shoot");
      bulletCooldown = 0.2;
    }

    function enemyShoot(enemy) {
      const startX = enemy.x + enemy.width / 2;
      const startY = enemy.y + enemy.height * 0.74;
      const targetX = player.x;
      const targetY = player.y - player.height * 0.18;
      const dx = targetX - startX;
      const dy = targetY - startY;
      const length = Math.hypot(dx, dy) || 1;
      const speed = randomBetween(130, 185) + Math.min(level, 10) * 7;
      enemyBullets.push({
        x: startX,
        y: startY,
        vx: (dx / length) * speed,
        vy: (dy / length) * speed,
        width: 12,
        height: 22,
        color: enemy.color
      });
    }

    function checkCollisions() {
      for (const bullet of bullets) {
        if (bullet.hit) continue;
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          if (rectsOverlap(
            bullet.x - bullet.width / 2,
            bullet.y - bullet.height / 2,
            bullet.width,
            bullet.height,
            enemy.x,
            enemy.y,
            enemy.width,
            enemy.height
          )) {
            bullet.hit = true;
            enemy.hp -= 1;
            if (enemy.hp <= 0) {
              enemy.alive = false;
              score += enemy.maxHp * 10;
              enemyExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, enemy.maxHp * 10);
            } else {
              score += 2;
              hitSpark(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
              playSound("hit");
            }
            updateHud();
            break;
          }
        }
      }
      bullets = bullets.filter((bullet) => !bullet.hit);

      if (playerInvulnerable > 0) return;
      const playerBox = {
        x: player.x - player.width * 0.32,
        y: player.y - player.height * 0.34,
        width: player.width * 0.64,
        height: player.height * 0.6
      };

      for (const bullet of enemyBullets) {
        if (rectsOverlap(
          bullet.x - bullet.width / 2,
          bullet.y - bullet.height / 2,
          bullet.width,
          bullet.height,
          playerBox.x,
          playerBox.y,
          playerBox.width,
          playerBox.height
        )) {
          bullet.hit = true;
          loseLife(true);
          break;
        }
      }
    }

    function loseLife(clearEnemyBullets) {
      if (playerInvulnerable > 0) return false;
      lives -= 1;
      updateHud();
      burst(player.x, player.y - 20, "#ffcf34", 22);
      shake = 2;
      playSound("damage");
      if (lives <= 0) {
        endGame("GAME OVER", `Final score: ${score}`);
        return true;
      }
      if (clearEnemyBullets) {
        enemyBullets = [];
        player.x = W / 2;
      }
      playerInvulnerable = 1.25;
      return true;
    }

    function enemyExplosion(x, y, color, points) {
      burst(x, y, color, 36);
      shake = Math.max(shake, 0.65);
      playSound("explosion");
      particles.push({
        type: "ring",
        x,
        y,
        radius: 8,
        maxRadius: 58,
        life: 0.38,
        maxLife: 0.38,
        color
      });
      for (let i = 0; i < 9; i += 1) {
        particles.push({
          type: "smoke",
          x: x + randomBetween(-12, 12),
          y: y + randomBetween(-10, 10),
          vx: randomBetween(-18, 18),
          vy: randomBetween(-24, 8),
          size: randomBetween(12, 24),
          life: randomBetween(0.48, 0.78),
          maxLife: 0.78
        });
      }
      floatTexts.push({
        x,
        y: y - 18,
        text: `+${points}`,
        life: 0.62,
        maxLife: 0.62
      });
    }

    function hitSpark(x, y, color) {
      burst(x, y, color, 10);
      particles.push({
        type: "ring",
        x,
        y,
        radius: 5,
        maxRadius: 24,
        life: 0.2,
        maxLife: 0.2,
        color
      });
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 95 + Math.random() * 250;
        particles.push({
          type: "spark",
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: randomBetween(3, 8),
          life: randomBetween(0.28, 0.58),
          maxLife: 0.58,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (const particle of particles) {
        if (particle.type === "ring") {
          const progress = 1 - particle.life / particle.maxLife;
          particle.radius = particle.maxRadius * progress;
        } else {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          if (particle.type === "smoke") {
            particle.size += 10 * dt;
          }
        }
        particle.life -= dt;
      }
      particles = particles.filter((particle) => particle.life > 0);

      for (const text of floatTexts) {
        text.y -= 46 * dt;
        text.life -= dt;
      }
      floatTexts = floatTexts.filter((text) => text.life > 0);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.save();
      if (shake > 0) {
        ctx.translate(randomBetween(-shake, shake), randomBetween(-shake, shake));
      }
      drawBackground();
      drawBullets();
      drawEnemies();
      drawPlayer();
      drawEnemyBullets();
      drawParticles();
      drawFloatTexts();
      ctx.restore();
    }

    function drawBackground() {
      const image = assets.background;
      if (image.complete) {
        ctx.drawImage(image, 0, 0, W, H);
        const haze = ctx.createLinearGradient(0, 0, 0, H);
        haze.addColorStop(0, "rgba(17, 28, 32, .08)");
        haze.addColorStop(1, "rgba(3, 8, 9, .28)");
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, W, H);
      } else {
        ctx.fillStyle = "#050713";
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawPlayer() {
      if (!player) return;
      const image = assets.tank;
      if (!image.complete) return;
      ctx.save();
      if (playerInvulnerable > 0) {
        ctx.globalAlpha = 0.45 + Math.sin(performance.now() * 0.03) * 0.25;
      }
      ctx.drawImage(
        image,
        player.x - player.width / 2,
        player.y - player.height / 2,
        player.width,
        player.height
      );
      if (muzzleFlash > 0) {
        const flashY = player.y - player.height / 2 + 3;
        ctx.globalAlpha = muzzleFlash / .055;
        ctx.fillStyle = "#fff9be";
        ctx.shadowColor = "#ff801f";
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.moveTo(player.x, flashY - 25);
        ctx.lineTo(player.x + 15, flashY + 4);
        ctx.lineTo(player.x, flashY + 12);
        ctx.lineTo(player.x - 15, flashY + 4);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBullets() {
      if (!bullets) return;
      for (const bullet of bullets) {
        ctx.save();
        ctx.translate(bullet.x, bullet.y);
        ctx.shadowColor = "#ff8a1f";
        ctx.shadowBlur = 16;
        ctx.fillStyle = "#ffed9a";
        ctx.beginPath();
        ctx.roundRect(-5, -18, 10, 30, 5);
        ctx.fill();
        ctx.fillStyle = "rgba(255, 92, 18, .72)";
        ctx.beginPath();
        ctx.moveTo(-6, 10);
        ctx.lineTo(0, 34 + Math.random() * 10);
        ctx.lineTo(6, 10);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawEnemyBullets() {
      if (!enemyBullets) return;
      for (const bullet of enemyBullets) {
        ctx.save();
        ctx.translate(bullet.x, bullet.y);
        ctx.rotate(Math.atan2(bullet.vy, bullet.vx) + Math.PI / 2);
        const gradient = ctx.createLinearGradient(0, -bullet.height / 2, 0, bullet.height / 2);
        gradient.addColorStop(0, "#fff2a8");
        gradient.addColorStop(0.45, "#ff6b2c");
        gradient.addColorStop(1, "#ff1f4f");
        ctx.shadowColor = bullet.color;
        ctx.shadowBlur = 14;
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(-bullet.width / 2, -bullet.height / 2, bullet.width, bullet.height, 6);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawEnemies() {
      if (!enemies) return;
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.58)";
        ctx.shadowBlur = 16;
        ctx.shadowOffsetY = 7;
        if (enemy.image.complete && enemy.image.naturalWidth > 0) {
          drawContainedImage(enemy.image, enemy.x, enemy.y, enemy.width, enemy.height);
        } else {
          ctx.fillStyle = enemy.color;
          ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        }
        ctx.restore();
        drawEnemyHealth(enemy);
      }
    }

    function drawEnemyHealth(enemy) {
      if (enemy.maxHp <= 1 && enemy.hp === enemy.maxHp) return;
      const barW = enemy.width * 0.78;
      const barH = 7;
      const x = enemy.x + (enemy.width - barW) / 2;
      const y = enemy.y + enemy.height + 9;
      const pct = clamp(enemy.hp / enemy.maxHp, 0, 1);
      ctx.save();
      ctx.fillStyle = "rgba(8, 10, 22, 0.78)";
      ctx.fillRect(x, y, barW, barH);
      ctx.fillStyle = pct > 0.5 ? "#34c759" : pct > 0.25 ? "#ffcf34" : "#ff3b30";
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 8;
      ctx.fillRect(x, y, barW * pct, barH);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, barW, barH);
      ctx.restore();
    }

    function drawParticles() {
      if (!particles) return;
      for (const particle of particles) {
        const alpha = Math.max(0, particle.life / particle.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha;
        if (particle.type === "ring") {
          ctx.strokeStyle = particle.color;
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 20;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.stroke();
        } else if (particle.type === "smoke") {
          ctx.fillStyle = "rgba(35, 37, 48, 0.7)";
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.translate(particle.x, particle.y);
          ctx.rotate(Math.atan2(particle.vy, particle.vx));
          ctx.fillStyle = particle.color;
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 12;
          ctx.fillRect(-particle.size / 2, -particle.size / 2, particle.size * 1.8, particle.size);
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    function drawFloatTexts() {
      if (!floatTexts) return;
      for (const text of floatTexts) {
        const alpha = Math.max(0, text.life / text.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.font = "900 30px Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.lineWidth = 5;
        ctx.strokeStyle = "#11131f";
        ctx.fillStyle = "#ffcf34";
        ctx.shadowColor = "rgba(255, 207, 52, 0.75)";
        ctx.shadowBlur = 14;
        ctx.strokeText(text.text, text.x, text.y);
        ctx.fillText(text.text, text.x, text.y);
        ctx.restore();
      }
    }

    function updateHud() {
      scoreEl.textContent = `SCORE: ${score}`;
      livesEl.textContent = `LIVES: ${lives}`;
    }

    function setAnimatedTitle(text) {
      const title = overlay.querySelector("h1");
      let index = 0;
      title.innerHTML = text.split(" ").map((word) => {
        const letters = [...word].map((letter) => {
          const span = `<span class="letter" style="--i:${index}">${letter}</span>`;
          index += 1;
          return span;
        }).join("");
        return `<span class="title-word">${letters}</span>`;
      }).join("");
    }

    function showBattleCallout(text) {
      battleCallout.textContent = text;
      battleCallout.classList.remove("show");
      void battleCallout.offsetWidth;
      battleCallout.classList.add("show");
      playSound("wave");
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function formationStepDelay() {
      const aliveCount = enemies.filter((enemy) => enemy.alive).length;
      return Math.max(0.12, 0.48 - Math.min(level, 10) * 0.018 - (24 - aliveCount) * 0.008);
    }

    function enemyHpFor(count) {
      if (count > 18 && count % 9 === 0) return 4;
      if (count > 8 && count % 4 === 0) return 3;
      if (count > 4 && count % 3 === 0) return 2;
      return 1;
    }

    function shootingEnemy(aliveEnemies) {
      const columns = new Map();
      for (const enemy of aliveEnemies) {
        const key = Math.round(enemy.x / 10);
        const current = columns.get(key);
        if (!current || enemy.y > current.y) {
          columns.set(key, enemy);
        }
      }
      const bottomEnemies = Array.from(columns.values());
      return bottomEnemies[Math.floor(Math.random() * bottomEnemies.length)] || aliveEnemies[0];
    }

    function drawContainedImage(image, x, y, width, height) {
      const scale = Math.min(width / image.naturalWidth, height / image.naturalHeight);
      const drawW = image.naturalWidth * scale;
      const drawH = image.naturalHeight * scale;
      ctx.drawImage(
        image,
        x + (width - drawW) / 2,
        y + (height - drawH) / 2,
        drawW,
        drawH
      );
    }

    function particleColor(index) {
      const colors = ["#ff3b30", "#ffcc00", "#34c759", "#00c7ff", "#af52de", "#ff7a00", "#f72585"];
      return colors[index % colors.length];
    }

    function pointerX(event) {
      const rect = canvas.getBoundingClientRect();
      return ((event.clientX - rect.left) / rect.width) * W;
    }

    function movePlayerToPointer(event) {
      player.x = clamp(pointerX(event), player.width / 2 + 10, W - player.width / 2 - 10);
    }

    window.addEventListener("keydown", (event) => {
      keys.add(event.code);
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space"].includes(event.code)) {
        event.preventDefault();
      }
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.code);
    });

    canvas.addEventListener("pointerdown", (event) => {
      pointerDown = true;
      if (running) {
        movePlayerToPointer(event);
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!running) return;
      if (event.pointerType === "mouse" || pointerDown) {
        movePlayerToPointer(event);
      }
    });

    window.addEventListener("pointerup", () => {
      pointerDown = false;
    });

    startButton.addEventListener("click", startGame);
    soundToggle.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundToggle.textContent = soundEnabled ? "SOUND: ON" : "SOUND: OFF";
      soundToggle.setAttribute("aria-pressed", String(!soundEnabled));
      if (soundEnabled) {
        initAudio();
        tone(440, .12, { endFrequency: 660, type: "triangle", volume: .04 });
      }
    });
    setAnimatedTitle("CITY INVADERS");
    Promise.all([...Object.values(assets), ...enemyImages].map((image) => image.decode().catch(() => null))).then(draw);
  </script>
</body>
</html>
