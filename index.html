<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boss Fight Targets Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050713;
      color: #f8fbff;
      font-family: "Courier New", monospace;
    }

    body {
      display: grid;
      place-items: center;
    }

    .game-shell {
      position: relative;
      width: min(100vw, 56.25vh);
      height: min(100vh, 177.78vw);
      max-width: 560px;
      max-height: 996px;
      background: #050713;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
      touch-action: none;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 18px;
      color: white;
      font-size: clamp(16px, 4vw, 28px);
      line-height: 1;
      text-shadow: 0 2px 0 #000, 0 0 12px rgba(255, 255, 255, 0.55);
      pointer-events: none;
      user-select: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(2, 4, 16, 0.58);
      text-align: center;
    }

    .overlay[hidden] {
      display: none;
    }

    .panel {
      width: min(100%, 380px);
      padding: 22px;
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 8px;
      background: rgba(4, 8, 24, 0.86);
      box-shadow: 0 0 34px rgba(82, 177, 255, 0.28);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(24px, 7vw, 44px);
      letter-spacing: 0;
      line-height: 0.95;
    }

    p {
      margin: 0 0 16px;
      font-size: clamp(13px, 3.2vw, 18px);
      line-height: 1.45;
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      background: #ffcf34;
      color: #11131f;
      font: 700 clamp(16px, 4vw, 20px) "Courier New", monospace;
      cursor: pointer;
      box-shadow: 0 4px 0 #b56a00, 0 0 18px rgba(255, 207, 52, 0.35);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #b56a00, 0 0 18px rgba(255, 207, 52, 0.35);
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <canvas id="game" width="540" height="960" aria-label="Space invaders game"></canvas>
    <div class="hud">
      <span id="score">SCORE: 0</span>
      <span id="lives">LIVES: 3</span>
    </div>
    <section id="overlay" class="overlay">
      <div class="panel">
        <h1>SPACE TARGETS</h1>
        <p>Move with arrow keys or drag. Shoot with space or tap. Clear each wave before the targets reach you.</p>
        <button id="startButton" type="button">START</button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const overlay = document.getElementById("overlay");
    const startButton = document.getElementById("startButton");

    const W = canvas.width;
    const H = canvas.height;
    const assets = {
      background: loadImage("assets/space-background.png"),
      ship: loadImage("assets/player-ship.png"),
      laser: loadImage("assets/laser.png")
    };
    const enemyImages = Array.from({ length: 21 }, (_, index) => {
      return loadImage(`assets/enemies/enemy-${String(index + 1).padStart(2, "0")}.png`);
    });

    const keys = new Set();
    let player;
    let bullets;
    let enemyBullets;
    let enemies;
    let particles;
    let score;
    let lives;
    let bulletCooldown;
    let wave;
    let waveTimer;
    let nextEnemyImageIndex;
    let playerInvulnerable;
    let running = false;
    let lastTime = 0;
    let pointerDown = false;

    function loadImage(src) {
      const image = new Image();
      image.src = src;
      return image;
    }

    function resetGame() {
      player = {
        x: W / 2,
        y: H - 110,
        width: 92,
        height: 120,
        speed: 420
      };
      bullets = [];
      enemyBullets = [];
      enemies = [];
      particles = [];
      score = 0;
      lives = 3;
      wave = 0;
      waveTimer = 0;
      nextEnemyImageIndex = 0;
      bulletCooldown = 0;
      playerInvulnerable = 0;
      createEnemies();
      updateHud();
    }

    function createEnemies() {
      wave += 1;
      const cols = 3;
      const rows = wave % 4 === 0 ? 3 : 2;
      const enemyW = 88;
      const enemyH = 88;
      const gapX = 46;
      const gapY = 30;
      const startX = (W - cols * enemyW - (cols - 1) * gapX) / 2;
      const startY = 82;

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const image = enemyImages[nextEnemyImageIndex % enemyImages.length];
          nextEnemyImageIndex += 1;
          enemies.push({
            x: startX + col * (enemyW + gapX),
            y: startY + row * (enemyH + gapY),
            width: enemyW,
            height: enemyH,
            image,
            color: particleColor(nextEnemyImageIndex),
            driftX: randomBetween(-8, 8),
            speedY: randomBetween(9, 20) + Math.min(wave, 10) * 0.9,
            shootTimer: randomBetween(1.6, 4.0),
            shootEvery: randomBetween(3.2, 5.8),
            alive: true
          });
        }
      }
      waveTimer = nextWaveDelay();
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.hidden = true;
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }

    function endGame(title, message) {
      running = false;
      overlay.hidden = false;
      overlay.querySelector("h1").textContent = title;
      overlay.querySelector("p").textContent = message;
      startButton.textContent = "RESTART";
    }

    function loop(now) {
      if (!running) return;
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      const move = (keys.has("ArrowRight") || keys.has("KeyD") ? 1 : 0) - (keys.has("ArrowLeft") || keys.has("KeyA") ? 1 : 0);
      player.x = clamp(player.x + move * player.speed * dt, player.width / 2 + 10, W - player.width / 2 - 10);

      bulletCooldown = Math.max(0, bulletCooldown - dt);
      if ((keys.has("Space") || keys.has("ArrowUp") || keys.has("KeyW")) && bulletCooldown === 0) {
        shoot();
      }

      for (const bullet of bullets) {
        bullet.y -= bullet.speed * dt;
      }
      bullets = bullets.filter((bullet) => bullet.y + bullet.height > -20);

      for (const bullet of enemyBullets) {
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
      }
      enemyBullets = enemyBullets.filter((bullet) => {
        return bullet.x > -40 && bullet.x < W + 40 && bullet.y > -40 && bullet.y < H + 60 && !bullet.hit;
      });

      playerInvulnerable = Math.max(0, playerInvulnerable - dt);
      waveTimer -= dt;
      updateEnemies(dt);
      updateParticles(dt);
      checkCollisions();

      const aliveCount = enemies.filter((enemy) => enemy.alive).length;
      if (aliveCount === 0) {
        score += 250;
        enemies = [];
        createEnemies();
      } else if (waveTimer <= 0 && aliveCount < 12) {
        createEnemies();
      }
    }

    function updateEnemies(dt) {
      const aliveEnemies = enemies.filter((enemy) => enemy.alive);
      if (aliveEnemies.length === 0) return;

      for (const enemy of aliveEnemies) {
        enemy.x += enemy.driftX * dt;
        enemy.y += enemy.speedY * dt;

        if (enemy.x < 18 || enemy.x + enemy.width > W - 18) {
          enemy.driftX *= -1;
          enemy.x = clamp(enemy.x, 18, W - enemy.width - 18);
        }

        enemy.shootTimer -= dt;
        if (enemy.shootTimer <= 0) {
          enemyShoot(enemy);
          enemy.shootTimer = enemy.shootEvery + randomBetween(-0.55, 0.75);
        }

        if (enemy.y > H + 20) {
          enemy.alive = false;
          loseLife(false);
        }
      }
    }

    function shoot() {
      bullets.push({
        x: player.x,
        y: player.y - player.height / 2 + 10,
        width: 24,
        height: 76,
        speed: 660
      });
      bulletCooldown = 0.2;
    }

    function enemyShoot(enemy) {
      const startX = enemy.x + enemy.width / 2;
      const startY = enemy.y + enemy.height * 0.74;
      const targetX = player.x;
      const targetY = player.y - player.height * 0.18;
      const dx = targetX - startX;
      const dy = targetY - startY;
      const length = Math.hypot(dx, dy) || 1;
      const speed = randomBetween(125, 190) + Math.min(wave, 8) * 5;
      enemyBullets.push({
        x: startX,
        y: startY,
        vx: (dx / length) * speed,
        vy: (dy / length) * speed,
        width: 12,
        height: 22,
        color: enemy.color
      });
    }

    function checkCollisions() {
      for (const bullet of bullets) {
        if (bullet.hit) continue;
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          if (rectsOverlap(
            bullet.x - bullet.width / 2,
            bullet.y - bullet.height / 2,
            bullet.width,
            bullet.height,
            enemy.x,
            enemy.y,
            enemy.width,
            enemy.height
          )) {
            bullet.hit = true;
            enemy.alive = false;
            score += 10;
            burst(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color);
            updateHud();
            break;
          }
        }
      }
      bullets = bullets.filter((bullet) => !bullet.hit);

      if (playerInvulnerable > 0) return;
      const playerBox = {
        x: player.x - player.width * 0.32,
        y: player.y - player.height * 0.34,
        width: player.width * 0.64,
        height: player.height * 0.6
      };

      for (const bullet of enemyBullets) {
        if (rectsOverlap(
          bullet.x - bullet.width / 2,
          bullet.y - bullet.height / 2,
          bullet.width,
          bullet.height,
          playerBox.x,
          playerBox.y,
          playerBox.width,
          playerBox.height
        )) {
          bullet.hit = true;
          loseLife(true);
          break;
        }
      }
    }

    function loseLife(clearEnemyBullets) {
      if (playerInvulnerable > 0) return;
      lives -= 1;
      updateHud();
      burst(player.x, player.y - 20, "#ffcf34");
      if (lives <= 0) {
        endGame("GAME OVER", `Final score: ${score}`);
        return;
      }
      if (clearEnemyBullets) {
        enemyBullets = [];
        player.x = W / 2;
      }
      playerInvulnerable = 1.25;
    }

    function burst(x, y, color) {
      for (let i = 0; i < 16; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 80 + Math.random() * 180;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.42,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (const particle of particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.life -= dt;
      }
      particles = particles.filter((particle) => particle.life > 0);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawBullets();
      drawEnemies();
      drawPlayer();
      drawEnemyBullets();
      drawParticles();
    }

    function drawBackground() {
      const image = assets.background;
      if (image.complete) {
        ctx.drawImage(image, 0, 0, W, H);
      } else {
        ctx.fillStyle = "#050713";
        ctx.fillRect(0, 0, W, H);
      }
    }

    function drawPlayer() {
      if (!player) return;
      const image = assets.ship;
      if (!image.complete) return;
      ctx.save();
      if (playerInvulnerable > 0) {
        ctx.globalAlpha = 0.45 + Math.sin(performance.now() * 0.03) * 0.25;
      }
      ctx.drawImage(
        image,
        player.x - player.width / 2,
        player.y - player.height / 2,
        player.width,
        player.height
      );
      ctx.restore();
    }

    function drawBullets() {
      if (!bullets) return;
      const image = assets.laser;
      for (const bullet of bullets) {
        if (image.complete) {
          ctx.drawImage(
            image,
            bullet.x - bullet.width / 2,
            bullet.y - bullet.height / 2,
            bullet.width,
            bullet.height
          );
        }
      }
    }

    function drawEnemyBullets() {
      if (!enemyBullets) return;
      for (const bullet of enemyBullets) {
        ctx.save();
        ctx.translate(bullet.x, bullet.y);
        ctx.rotate(Math.atan2(bullet.vy, bullet.vx) + Math.PI / 2);
        const gradient = ctx.createLinearGradient(0, -bullet.height / 2, 0, bullet.height / 2);
        gradient.addColorStop(0, "#fff2a8");
        gradient.addColorStop(0.45, "#ff6b2c");
        gradient.addColorStop(1, "#ff1f4f");
        ctx.shadowColor = bullet.color;
        ctx.shadowBlur = 14;
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(-bullet.width / 2, -bullet.height / 2, bullet.width, bullet.height, 6);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawEnemies() {
      if (!enemies) return;
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.58)";
        ctx.shadowBlur = 16;
        ctx.shadowOffsetY = 7;
        if (enemy.image.complete && enemy.image.naturalWidth > 0) {
          drawContainedImage(enemy.image, enemy.x, enemy.y, enemy.width, enemy.height);
        } else {
          ctx.fillStyle = enemy.color;
          ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      if (!particles) return;
      for (const particle of particles) {
        ctx.globalAlpha = Math.max(0, particle.life / 0.42);
        ctx.fillStyle = particle.color;
        ctx.fillRect(particle.x - 3, particle.y - 3, 6, 6);
      }
      ctx.globalAlpha = 1;
    }

    function updateHud() {
      scoreEl.textContent = `SCORE: ${score}`;
      livesEl.textContent = `LIVES: ${lives}`;
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function nextWaveDelay() {
      return Math.max(4.2, 8.5 - Math.min(wave, 10) * 0.25);
    }

    function drawContainedImage(image, x, y, width, height) {
      const scale = Math.min(width / image.naturalWidth, height / image.naturalHeight);
      const drawW = image.naturalWidth * scale;
      const drawH = image.naturalHeight * scale;
      ctx.drawImage(
        image,
        x + (width - drawW) / 2,
        y + (height - drawH) / 2,
        drawW,
        drawH
      );
    }

    function particleColor(index) {
      const colors = ["#ff3b30", "#ffcc00", "#34c759", "#00c7ff", "#af52de", "#ff7a00", "#f72585"];
      return colors[index % colors.length];
    }

    function pointerX(event) {
      const rect = canvas.getBoundingClientRect();
      return ((event.clientX - rect.left) / rect.width) * W;
    }

    window.addEventListener("keydown", (event) => {
      keys.add(event.code);
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space"].includes(event.code)) {
        event.preventDefault();
      }
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.code);
    });

    canvas.addEventListener("pointerdown", (event) => {
      pointerDown = true;
      if (running) {
        player.x = clamp(pointerX(event), player.width / 2 + 10, W - player.width / 2 - 10);
        shoot();
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (pointerDown && running) {
        player.x = clamp(pointerX(event), player.width / 2 + 10, W - player.width / 2 - 10);
      }
    });

    window.addEventListener("pointerup", () => {
      pointerDown = false;
    });

    startButton.addEventListener("click", startGame);
    Promise.all([...Object.values(assets), ...enemyImages].map((image) => image.decode().catch(() => null))).then(draw);
  </script>
</body>
</html>
